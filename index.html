<!DOCTYPE html>
<html lang="en">
<head>

  <title>Arts And Intelligence Inc</title>

      display: flex;
      align-items: center;
      justify-content: center;

      text-align: center;

    p {

      color: #71717a;

<body>
  <div class="container">
    <img src="logo.png" alt="Arts And Intelligence Inc logo" class="logo" />

    <div class="footer">

</html>
